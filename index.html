<!DOCTYPE html>
<html>
<head>
    <title>Institutional Audit</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .audit-box { border: 2px solid #f0b90b; padding: 15px; border-radius: 10px; }
        .highlight { font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>
    <div class="audit-box">
        <h1>Binance Listing Audit: bnballen-money</h1>
        <p>Verification Status: <span id="status" class="highlight">Syncing...</span></p>
        <p>Entity Tier: <span id="tier">...</span></p>
        <p>NFT Inventory: <span id="inventory" class="highlight">0</span> units (Series 1-5)</p>
        <p>Settlement Hash: <small><span id="hash">...</span></small></p>
    </div>

    <script>
        fetch('/audit_data.json')
            .then(response => {
                if (!response.ok) throw new Error('Data file missing');
                return response.json();
            })
            .then(data => {
                // These MUST match your JSON keys exactly
                document.getElementById('status').innerText = data.verification_status;
                document.getElementById('tier').innerText = data.account_type;
                document.getElementById('inventory').innerText = data.inventory.total_holdings.toLocaleString();
                document.getElementById('hash').innerText = data.settlement_ref;
            })
            .catch(error => {
                document.getElementById('status').innerText = "Sync Error - Check JSON Path";
                console.error('Audit Error:', error);
            });
    </script>
</body>
</html>
